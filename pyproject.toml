[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".venv", "build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["B008"]  # FastAPI-style default args

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B018"]  # useless expressions fine in tests
"src/dashboard/i18n.py" = ["E501"]  # translation strings are naturally long
"src/dashboard/settings_tab.py" = ["E501"]  # help text is naturally long
"src/locations.py" = ["E501"]  # location display strings are naturally long
