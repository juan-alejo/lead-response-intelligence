# Pre-configured category packs — shipped with the repo so new operators
# get a useful starting set in their market without hand-typing 10 rows.
#
# Each pack has:
#   - name: stable id (snake_case, unique across packs)
#   - display_name: label shown in the pack selector dropdown
#   - description: one line explaining the market segment covered
#   - language: ISO code of the verticals' query language (es, en, pt, …)
#   - region: free-form human region tag for filtering in the UI
#   - verticals: list of Vertical rows (same shape as config/verticals.yaml)
#
# Queries are chosen to be ones Google Places actually matches against its
# taxonomy. "small business" / "pyme" don't match any Places type and
# return noise; "dentist" / "estudio jurídico" / "escritório de advocacia"
# match well and return clean results.
#
# Operator flow: Settings → Pack selector → pick one → "Apply" replaces
# the current config/verticals.yaml. Packs are NOT auto-reloaded into
# verticals.yaml so an operator who customized their list won't lose it.

packs:
  # ---------------------------------------------------------------
  - name: servicios_argentina
    display_name: 🇦🇷 Servicios locales Argentina
    description: 10 tipos de negocio típicos B2B / servicios profesionales en Argentina. Queries probadas en Google Places con terminología local.
    language: es
    region: Argentina
    verticals:
      - name: abogados
        display_name: Abogados / Estudios jurídicos
        query: estudio jurídico
      - name: dentistas
        display_name: Dentistas / Odontólogos
        query: odontólogo
      - name: clinicas_medicas
        display_name: Clínicas médicas
        query: clínica médica
      - name: contadores
        display_name: Contadores públicos
        query: contador
      - name: arquitectos
        display_name: Arquitectos / Estudios de arquitectura
        query: estudio de arquitectura
      - name: inmobiliarias
        display_name: Inmobiliarias
        query: inmobiliaria
      - name: peluquerias
        display_name: Peluquerías
        query: peluquería
      - name: esteticas
        display_name: Centros de estética
        query: centro de estética
      - name: veterinarias
        display_name: Veterinarias
