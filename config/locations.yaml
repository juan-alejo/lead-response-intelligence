# Editable desde el tab "Configuración" del dashboard.
#
# Cada ubicación tiene:
# - name: id interno (snake_case, único — lo usan storage + CLI)
# - display_name: lo que ve el operador en los dropdowns
# - query_suffix: se concatena al final de la query a Google Places, después
#   del tipo de negocio. Ej: vertical="law firm" + suffix="in Manhattan, New York"
#   → "law firm in Manhattan, New York".
#
# Agregá / quitá libremente. Funciona para cualquier ciudad / provincia
# / país — el pipeline no asume ninguna geografía específica.

locations:
  # --- NYC (originales) ---
  - name: manhattan
    display_name: Manhattan, NY
    query_suffix: in Manhattan, New York
  - name: brooklyn
    display_name: Brooklyn, NY
    query_suffix: in Brooklyn, New York
  - name: queens
    display_name: Queens, NY
    query_suffix: in Queens, New York
  - name: bronx
    display_name: Bronx, NY
    query_suffix: in the Bronx, New York
  - name: staten_island
    display_name: Staten Island, NY
    query_suffix: in Staten Island, New York

  # --- Argentina ---
  - name: caba
    display_name: CABA (Ciudad de Buenos Aires)
    query_suffix: in Ciudad Autónoma de Buenos Aires, Argentina
  - name: gba_norte
    display_name: GBA Norte
    query_suffix: in Gran Buenos Aires Norte, Argentina
  - name: cordoba_ar
    display_name: Córdoba, Argentina
    query_suffix: in Córdoba, Argentina
  - name: rosario
    display_name: Rosario, Argentina
    query_suffix: in Rosario, Santa Fe, Argentina
  - name: mendoza
    display_name: Mendoza, Argentina
    query_suffix: in Mendoza, Argentina
  - name: argentina_all
    display_name: Toda Argentina
    query_suffix: in Argentina

  # --- LatAm ---
  - name: cdmx
    display_name: CDMX (Ciudad de México)
    query_suffix: in Ciudad de México, Mexico
  - name: sao_paulo
    display_name: São Paulo, Brasil
    query_suffix: in São Paulo, Brazil
  - name: santiago_cl
    display_name: Santiago de Chile
    query_suffix: in Santiago, Chile

  # --- Europa ---
  - name: madrid
    display_name: Madrid, España
    query_suffix: in Madrid, Spain
  - name: barcelona
    display_name: Barcelona, España
    query_suffix: in Barcelona, Spain

  # --- Country-level (para cobertura nacional entera) ---
  - name: mexico_all
    display_name: Todo México
    query_suffix: in Mexico
  - name: usa_all
    display_name: All United States
    query_suffix: in the United States
